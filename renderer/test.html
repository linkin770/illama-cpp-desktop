<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test</title>
  </head>
  <body>
    <div id="app">Loading...</div>
    <script type="module">
      try {
        console.log('Testing imports...');
        const { state } = await import('./js/state.js');
        console.log('state imported:', state);
        
        const { escapeHtml } = await import('./js/utils.js');
        console.log('utils imported');
        
        const { modelName } = await import('./js/messages.js');
        console.log('messages imported');
        
        const { renderChat } = await import('./js/chat.js');
        console.log('chat imported');
        
        const { renderPreviewModal } = await import('./js/components.js');
        console.log('components imported');
        
        document.getElementById('app').innerHTML = '<div style="color: green;">All imports successful!</div>';
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('app').innerHTML = `<div style="color: red;">Error: ${error.message}</div>`;
      }
    </script>
  </body>
</html>
